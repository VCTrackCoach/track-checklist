<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Meet Loading Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ea;
    --ink: #0a0a0a;
    --paper: #ffffff;
    --accent: #ff4e00;
    --accent-2: #ffc300;
    --check: #1a7431;
    --muted: #6b6557;
    --line: #2a2a2a;
    --stripe: #e8e3d6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter Tight', sans-serif;
    font-size: 16px;
    line-height: 1.4;
    overscroll-behavior-y: contain;
  }

  body {
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent 0, transparent 31px, rgba(10,10,10,0.04) 31px, rgba(10,10,10,0.04) 32px);
    padding-bottom: 120px;
  }

  .header {
    background: var(--ink);
    color: var(--bg);
    padding: 20px 20px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }

  .title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    letter-spacing: -0.02em;
    line-height: 0.95;
    text-transform: uppercase;
  }

  .title .accent { color: var(--accent-2); }

  .datestamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .progress-bar {
    height: 10px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    position: relative;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    background-image: repeating-linear-gradient(45deg, transparent 0 6px, rgba(255,255,255,0.2) 6px 12px);
  }

  .progress-text {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  .progress-count { color: var(--bg); font-weight: 700; }
  .progress-pct { color: var(--accent-2); font-weight: 700; }

  .controls {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .btn {
    flex: 1;
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.3);
    background: transparent;
    color: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }

  .btn:active { transform: scale(0.96); background: var(--accent); border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 14px;
  }

  .category {
    margin-top: 18px;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    overflow: hidden;
  }

  .cat-header {
    background: var(--ink);
    color: var(--bg);
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  .cat-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .cat-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent-2);
    font-weight: 700;
  }

  .cat-meta.done { color: var(--check); background: var(--bg); padding: 2px 6px; }

  .items { list-style: none; }

  .item {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px dashed rgba(10,10,10,0.15);
    cursor: pointer;
    gap: 14px;
    position: relative;
    min-height: 56px;
    transition: background 0.15s;
  }

  .item:last-child { border-bottom: none; }
  .item:nth-child(even) { background: var(--stripe); }
  .item:active { background: var(--accent-2); }

  .checkbox {
    width: 28px;
    height: 28px;
    border: 2.5px solid var(--ink);
    background: var(--paper);
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .item.checked .checkbox {
    background: var(--check);
    border-color: var(--check);
  }

  .item.checked .checkbox::after {
    content: '';
    width: 14px;
    height: 8px;
    border-left: 3px solid white;
    border-bottom: 3px solid white;
    transform: rotate(-45deg) translate(1px, -2px);
    animation: check 0.25s ease-out;
  }

  @keyframes check {
    from { transform: rotate(-45deg) translate(1px, -2px) scale(0); }
    to { transform: rotate(-45deg) translate(1px, -2px) scale(1); }
  }

  .item-text {
    flex: 1;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.3;
  }

  .item-qty {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--ink);
    color: var(--bg);
    padding: 3px 7px;
    font-weight: 700;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .item.checked .item-text {
    text-decoration: line-through;
    text-decoration-thickness: 2px;
    text-decoration-color: var(--accent);
    color: var(--muted);
  }

  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--ink);
    color: var(--bg);
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    border-top: 3px solid var(--accent);
  }

  .footer-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .footer-value {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    letter-spacing: -0.01em;
  }

  .footer-value.all-done { color: var(--accent-2); }

  .add-item {
    display: flex;
    gap: 0;
    padding: 12px;
    border-top: 2px dashed rgba(10,10,10,0.2);
    background: var(--stripe);
  }

  .add-input {
    flex: 1;
    padding: 10px 12px;
    border: 2px solid var(--ink);
    background: var(--paper);
    font-family: 'Inter Tight', sans-serif;
    font-size: 14px;
    font-weight: 500;
    outline: none;
  }

  .add-input:focus { background: var(--accent-2); }

  .add-btn {
    padding: 0 16px;
    background: var(--ink);
    color: var(--bg);
    border: 2px solid var(--ink);
    border-left: none;
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    cursor: pointer;
  }

  .add-btn:active { background: var(--accent); }

  .delete-btn {
    opacity: 0;
    padding: 4px 8px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    cursor: pointer;
  }

  .item:active .delete-btn,
  .item.show-delete .delete-btn { opacity: 1; }

  .collapsed .items,
  .collapsed .add-item { display: none; }

  .chev {
    transition: transform 0.2s;
    font-size: 10px;
    margin-left: 8px;
  }

  .collapsed .chev { transform: rotate(-90deg); }

  .reset-confirm {
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }

  .reset-confirm.show { display: flex; }

  .reset-modal {
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--accent);
    padding: 24px;
    max-width: 340px;
    width: 100%;
  }

  .reset-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .reset-msg {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .reset-actions {
    display: flex;
    gap: 8px;
  }

  .reset-actions .btn {
    color: var(--ink);
    border-color: var(--ink);
  }

  .reset-actions .btn.danger {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }

  .complete-banner {
    display: none;
    background: var(--check);
    color: white;
    padding: 14px 16px;
    text-align: center;
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 18px;
    border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
  }

  .complete-banner.show {
    display: block;
    animation: pop 0.4s cubic-bezier(0.22, 1.2, 0.36, 1);
  }

  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="container" style="padding: 0;">
    <div class="header-top">
      <h1 class="title">Meet Day<br><span class="accent">Load-Out</span></h1>
      <div class="datestamp" id="datestamp">—</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text">
      <span class="progress-count" id="progressCount">0 / 0 loaded</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="controls">
      <button class="btn" id="collapseAll">Collapse</button>
      <button class="btn" id="expandAll">Expand</button>
      <button class="btn" id="resetBtn">Reset</button>
    </div>
  </div>
</header>

<div class="container" id="app"></div>

<div class="complete-banner" id="completeBanner">✓ All loaded — you're good to go</div>

<footer class="footer">
  <div>
    <div class="footer-label">Remaining</div>
    <div class="footer-value" id="remainingCount">—</div>
  </div>
  <div style="text-align: right;">
    <div class="footer-label">Loaded</div>
    <div class="footer-value" id="loadedCount">—</div>
  </div>
</footer>

<div class="reset-confirm" id="resetConfirm">
  <div class="reset-modal">
    <div class="reset-title">Reset all?</div>
    <div class="reset-msg">This will uncheck every item. Your custom items will be kept.</div>
    <div class="reset-actions">
      <button class="btn" id="resetCancel">Cancel</button>
      <button class="btn danger" id="resetConfirmBtn">Reset</button>
    </div>
  </div>
</div>

<script>
  const DEFAULT_DATA = [
    {
      category: "Spikes & Blocks",
      items: [
        { text: "Spikes Box — Sprints", qty: "" },
        { text: "Spikes Box — Throws", qty: "" },
        { text: "Black Box with wheels", qty: "" },
        { text: "Starting Blocks", qty: "x3" },
      ]
    },
    {
      category: "Relay & Track",
      items: [
        { text: "Batons", qty: "x20" },
        { text: "4x100 Flags", qty: "7 total" },
        { text: "Poles for Pole Vault", qty: "" },
      ]
    },
    {
      category: "Javelins",
      items: [
        { text: "Gr. 8–10 Girls Javelin (500g)", qty: "x2" },
        { text: "Gr. 11/12 Girls / Gr. 8 Boys Javelin (600g)", qty: "x2" },
        { text: "Gr. 9/10 Boys Javelin (700g)", qty: "x2" },
        { text: "Gr. 11/12 Boys Javelin (800g)", qty: "x2" },
        { text: "Cones to block off Javelin area", qty: "x10" },
        { text: "Big Cones (UBC Javelin area)", qty: "" },
      ]
    },
    {
      category: "Hammers",
      items: [
        { text: "Hammers 3kg", qty: "x2" },
        { text: "Hammers 4kg", qty: "x2" },
        { text: "Hammers 5kg", qty: "x2" },
        { text: "Hammers 6kg", qty: "x2" },
      ]
    },
    {
      category: "Measuring & Tech",
      items: [
        { text: "Leica Disto — Discus", qty: "" },
        { text: "Tripod (Discus)", qty: "" },
        { text: "Leica Disto — Javelin", qty: "" },
        { text: "Tripod (Javelin)", qty: "" },
        { text: "AA Batteries for Leica Distos", qty: "x4 (2 each)" },
        { text: "Measuring Tape #1", qty: "" },
        { text: "Measuring Tape #2", qty: "" },
      ]
    },
    {
      category: "Tents & Shelter",
      items: [
        { text: "Tent", qty: "" },
        { text: "Tent", qty: "" },
      ]
    },
    {
      category: "Admin & Safety",
      items: [
        { text: "Attendance sheet", qty: "" },
        { text: "Pencils", qty: "" },
        { text: "Green tape", qty: "" },
        { text: "Tool Kit", qty: "" },
        { text: "Medical Kit", qty: "" },
        { text: "Singlets", qty: "" },
      ]
    },
  ];

  const STATE_KEY = 'meetLoadout_v1';
  const DATA_KEY = 'meetLoadoutData_v1';
  const COLLAPSE_KEY = 'meetLoadoutCollapse_v1';

  let data = loadData();
  let state = loadState();
  let collapsed = loadCollapsed();

  function loadData() {
    try {
      const saved = localStorage.getItem(DATA_KEY);
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }

  function loadState() {
    try {
      const saved = localStorage.getItem(STATE_KEY);
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return {};
  }

  function loadCollapsed() {
    try {
      const saved = localStorage.getItem(COLLAPSE_KEY);
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return {};
  }

  function saveData()  { localStorage.setItem(DATA_KEY, JSON.stringify(data)); }
  function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
  function saveCollapsed() { localStorage.setItem(COLLAPSE_KEY, JSON.stringify(collapsed)); }

  function itemKey(ci, ii) { return `${ci}-${ii}`; }

  function render() {
    const app = document.getElementById('app');
    app.innerHTML = '';

    let total = 0, done = 0;

    data.forEach((cat, ci) => {
      const catEl = document.createElement('section');
      catEl.className = 'category' + (collapsed[ci] ? ' collapsed' : '');

      let catDone = 0;
      cat.items.forEach((_, ii) => {
        total++;
        if (state[itemKey(ci, ii)]) { done++; catDone++; }
      });

      const allDone = cat.items.length > 0 && catDone === cat.items.length;

      const head = document.createElement('div');
      head.className = 'cat-header';
      head.innerHTML = `
        <div class="cat-title">${escapeHtml(cat.category)}</div>
        <div class="cat-meta ${allDone ? 'done' : ''}">${catDone}/${cat.items.length}${allDone ? ' ✓' : ''}<span class="chev">▼</span></div>
      `;
      head.addEventListener('click', () => {
        collapsed[ci] = !collapsed[ci];
        saveCollapsed();
        render();
      });
      catEl.appendChild(head);

      const ul = document.createElement('ul');
      ul.className = 'items';

      cat.items.forEach((item, ii) => {
        const key = itemKey(ci, ii);
        const isChecked = !!state[key];
        const li = document.createElement('li');
        li.className = 'item' + (isChecked ? ' checked' : '');
        li.innerHTML = `
          <div class="checkbox"></div>
          <div class="item-text">${escapeHtml(item.text)}</div>
          ${item.qty ? `<div class="item-qty">${escapeHtml(item.qty)}</div>` : ''}
          <button class="delete-btn" data-ci="${ci}" data-ii="${ii}" aria-label="Delete">✕</button>
        `;

        let pressTimer = null;
        const toggle = (e) => {
          if (e.target.classList.contains('delete-btn')) return;
          state[key] = !state[key];
          saveState();
          render();
          if (navigator.vibrate) navigator.vibrate(15);
        };

        li.addEventListener('click', toggle);

        // Long press to reveal delete on custom items
        li.addEventListener('touchstart', () => {
          pressTimer = setTimeout(() => {
            li.classList.add('show-delete');
          }, 600);
        });
        li.addEventListener('touchend', () => clearTimeout(pressTimer));
        li.addEventListener('touchmove', () => clearTimeout(pressTimer));

        ul.appendChild(li);
      });

      catEl.appendChild(ul);

      // Add-item row
      const addRow = document.createElement('div');
      addRow.className = 'add-item';
      addRow.innerHTML = `
        <input type="text" class="add-input" placeholder="Add item..." maxlength="80">
        <button class="add-btn">+</button>
      `;
      const input = addRow.querySelector('.add-input');
      const addBtn = addRow.querySelector('.add-btn');
      const doAdd = () => {
        const val = input.value.trim();
        if (!val) return;
        data[ci].items.push({ text: val, qty: '' });
        saveData();
        render();
      };
      addBtn.addEventListener('click', doAdd);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doAdd(); });
      catEl.appendChild(addRow);

      // Delete handler
      catEl.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const dci = parseInt(btn.dataset.ci);
          const dii = parseInt(btn.dataset.ii);
          data[dci].items.splice(dii, 1);
          // Shift state keys down for items after the deleted one
          const newState = {};
          Object.keys(state).forEach(k => {
            const [kci, kii] = k.split('-').map(Number);
            if (kci === dci && kii === dii) return;
            if (kci === dci && kii > dii) {
              newState[`${kci}-${kii - 1}`] = state[k];
            } else {
              newState[k] = state[k];
            }
          });
          state = newState;
          saveData();
          saveState();
          render();
        });
      });

      app.appendChild(catEl);
    });

    // Progress
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressCount').textContent = `${done} / ${total} loaded`;
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('loadedCount').textContent = done;
    document.getElementById('remainingCount').textContent = total - done;

    const remainingEl = document.getElementById('remainingCount');
    const banner = document.getElementById('completeBanner');
    if (total > 0 && done === total) {
      remainingEl.classList.add('all-done');
      remainingEl.textContent = '0 ✓';
      banner.classList.add('show');
    } else {
      remainingEl.classList.remove('all-done');
      banner.classList.remove('show');
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // Date stamp
  const now = new Date();
  const dstr = now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  document.getElementById('datestamp').textContent = dstr.toUpperCase();

  // Controls
  document.getElementById('collapseAll').addEventListener('click', () => {
    data.forEach((_, i) => collapsed[i] = true);
    saveCollapsed();
    render();
  });
  document.getElementById('expandAll').addEventListener('click', () => {
    data.forEach((_, i) => collapsed[i] = false);
    saveCollapsed();
    render();
  });

  const resetConfirm = document.getElementById('resetConfirm');
  document.getElementById('resetBtn').addEventListener('click', () => resetConfirm.classList.add('show'));
  document.getElementById('resetCancel').addEventListener('click', () => resetConfirm.classList.remove('show'));
  document.getElementById('resetConfirmBtn').addEventListener('click', () => {
    state = {};
    saveState();
    resetConfirm.classList.remove('show');
    render();
  });

  render();
</script>

</body>
</html>
